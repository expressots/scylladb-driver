services:
  scylla:
    image: scylladb/scylla:6.2
    command: --smp 1 --memory 1G --overprovisioned 1 --developer-mode 1
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
